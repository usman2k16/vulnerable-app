<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">

  <!--
    Commit 6 (CSP FIX): the policy is now STRICT and governs the SPA document. Inline scripts,
    eval, external/CDN scripts, non-https images, and cross-origin fetches are all blocked
    (the /csp playground demos all report "blocked", and a strict script-src is what backstops the
    XSS payloads from Commits 2-3). To revert to the weak/vulnerable policy for comparison, set:
      script-src 'self' 'unsafe-inline' 'unsafe-eval'  (and add http: to img-src), then reload.
    Notes: style-src keeps 'unsafe-inline' because Angular injects runtime styles; connect-src must
    include http://localhost:3000 for the app's API calls; frame-ancestors is header-only (not via meta).
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' http://localhost:3000; base-uri 'self'; form-action 'self'; object-src 'none'">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
