<div class="card">
  <h2>New post</h2>
  <form (ngSubmit)="submit()">
    <label>Title
      <input name="title" [(ngModel)]="model.title" />
    </label>
    <label>Content
      <textarea name="content" rows="4" [(ngModel)]="model.content"></textarea>
      <app-copy-hint label="Stored XSS — paste:" [payload]="xss.content" />
    </label>
    <label>Image URL
      <input name="imageUrl" [(ngModel)]="model.imageUrl" placeholder="https://..." />
      <app-copy-hint label="Attribute XSS — first set this to:" [payload]="'x'" />
    </label>
    <label>Image alt text
      <input name="imageAlt" [(ngModel)]="model.imageAlt" />
      <app-copy-hint label="Attribute XSS — then set alt to:" [payload]="xss.imageAlt" />
    </label>
    <label>Link URL
      <input name="linkUrl" [(ngModel)]="model.linkUrl" placeholder="https://..." />
      <app-copy-hint label="URL XSS — paste, then click Read more:" [payload]="xss.linkUrl" />
    </label>
    <label>Title color
      <input name="color" [(ngModel)]="model.color" placeholder="blue, #336699, rgb(...)" />
      <app-copy-hint label="CSS injection — paste:" [payload]="xss.color" />
    </label>
    @if (error) {
      <p class="error">{{ error }}</p>
    }
    <button type="submit">Publish</button>
  </form>
</div>
