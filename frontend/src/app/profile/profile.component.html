@if (auth.currentUser(); as user) {
  <div class="card">
    <h2>Profile</h2>
    <p><strong>Username:</strong> {{ user.username }}</p>
    <!-- VULNERABLE (vector 6): raw bio injected as HTML -->
    <p><strong>Bio:</strong> <span [innerHTML]="user.bio | safe:'html'"></span></p>

    <h3>Edit profile</h3>
    <form (ngSubmit)="save()">
      <label>Bio
        <textarea name="bio" rows="3" [(ngModel)]="bio"></textarea>
        <app-copy-hint label="Stored XSS — paste, then reload:" [payload]="bioXss" />
      </label>
      <label>Email
        <input name="email" [(ngModel)]="email" />
      </label>
      <button type="submit">Save</button>
      @if (saved) {
        <span class="saved">Saved!</span>
      }
    </form>
  </div>
} @else {
  <p>Please <a routerLink="/login">log in</a> to view your profile.</p>
}
