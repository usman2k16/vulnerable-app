<h2>Search posts</h2>

<form class="search-bar" (ngSubmit)="submit()">
  <input name="q" [(ngModel)]="q" placeholder="Search by title or content..." />
  <button type="submit">Search</button>
</form>

<app-copy-hint label="✅ Now escaped — search this; it shows as text (no popup):" [payload]="reflectedXss" />

@if (searched) {
  <!-- FIXED: echoed query is escaped server-side and rendered via interpolation -->
  <p class="result-query">Results for: {{ resultQuery }}</p>

  @if (results.length === 0) {
    <p class="empty">No posts matched your search.</p>
  } @else {
    @for (post of results; track post.id) {
      <article class="card result">
        <h3>{{ post.title }}</h3>
        <p class="meta">by {{ post.authorUsername }}</p>
        <p>{{ post.content }}</p>
      </article>
    }
  }
}
